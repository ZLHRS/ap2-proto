name: Generate Protos

on:
  push:
    branches:
      - main
    paths:
      - 'proto/**/*.proto'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Proto Repository
        uses: actions/checkout@v4
        with:
          path: proto-repo

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '25.3'

      - name: Install Go Protoc Plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.33.0
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.3.0
          
      - name: Checkout Generated Repository
        uses: actions/checkout@v4
        with:
          repository: ZLHRS/ap2-generated
          path: generated-repo
          token: ${{ secrets.PAT_TOKEN }}

      - name: Generate Code
        run: |
          # Create directories if they don't exist
          mkdir -p generated-repo/payment/v1 generated-repo/order/v1
          
          # Generate payment protos
          protoc \
            -I=proto-repo/proto \
            --go_out=generated-repo \
            --go_opt=paths=source_relative \
            --go-grpc_out=generated-repo \
            --go-grpc_opt=paths=source_relative \
            proto-repo/proto/payment/v1/payment.proto

          # Generate order protos
          protoc \
            -I=proto-repo/proto \
            --go_out=generated-repo \
            --go_opt=paths=source_relative \
            --go-grpc_out=generated-repo \
            --go-grpc_opt=paths=source_relative \
            proto-repo/proto/order/v1/order.proto

      - name: Commit and Push to Generated Repo
        run: |
          cd generated-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          
          # Only commit and push if there are changes
          if ! git diff-index --quiet HEAD; then
            git commit -m "Auto-generated gRPC code from ap2-protos commit ${{ github.sha }}"
            git push origin main
          else
            echo "No changes to commit"
          fi
